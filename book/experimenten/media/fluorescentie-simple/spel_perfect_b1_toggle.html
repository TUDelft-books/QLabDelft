
<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <title>Fosforescentie Toy Model</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script>
    window.MathJax = { tex: { inlineMath: [["$","$"],["\\(","\\)"]] } };
  </script>
  <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
  <style>
    body { font-family: sans-serif; display:flex; flex-direction:column; align-items:center; background:#f0f0f0; }
    .board{display:grid;grid-template-columns:repeat(10,30px);gap:5px;margin:10px;}
    .square{width:30px;height:30px;border:1px solid #333;display:flex;align-items:center;justify-content:center;font-size:10px;border-radius:3px;}
    .row-h{background:#ffcccc;} .row-l{background:#ccffcc;}
    .coin{width:20px;height:20px;background:#444;border-radius:50%;}
    #chart-container{width:80%;max-width:600px;background:white;padding:10px;border-radius:8px;}
  </style>
</head>
<body>
  <h1>Fosforescentie Verval Model</h1>
  <p>Simulatie van tweede-orde kinetiek met dobbelstenen [Malgieri, 2018]</p>
  
  <div class="status-text">Aangeslagen-toestand (H)</div>
  <div id="board-h" class="board"></div>
  <div class="status-text">Grondtoestand (L)</div>
  <div id="board-l" class="board"></div>

  <div class="controls">
    <button onclick="playTurn()">Gooi</button>
    <button id="autoBtn" onclick="autoToggle()">Auto</button>
    <button onclick="resetGame()">Reset</button>
    <button onclick="fitReciprocalPlot()">Machtswet-fit</button>
    <br><br>
    <div id="fit-info" style="font-weight:bold;"></div>
    <div>Model: $N_H(n)=\dfrac{a}{(n+n_0)}$ (b=1)</div>
    <br>
    <div id="worp-info">Worpen: 0  Resterende: 30</div>
  </div>

  <div id="chart-container"><canvas id="decayChart"></canvas></div>

  <script>
    const S = 30; 
    let rowH = new Array(S).fill(true);
    let rowL = new Array(S).fill(false);
    let throwCount = 0;
    let history = [{x:0, y:S}];
    let chart;

    // --- AUTO toggle state ---
    let autoRunning = false;
    let autoIntervalId = null;

    function createBoard(){
      const bh=document.getElementById('board-h');
      const bl=document.getElementById('board-l');
      bh.innerHTML=''; bl.innerHTML='';
      for(let i=0;i<S;i++){
        bh.innerHTML += `<div id="h-${i}" class="square row-h">${rowH[i]?'<div class="coin"></div>':''}</div>`;
        bl.innerHTML += `<div id="l-${i}" class="square row-l">${rowL[i]?'<div class="coin"></div>':''}</div>`;
      }
    }

    function updateUI(){
      for(let i=0;i<S;i++){
        document.getElementById(`h-${i}`).innerHTML = rowH[i]?'<div class="coin"></div>':'';
        document.getElementById(`l-${i}`).innerHTML = rowL[i]?'<div class="coin"></div>':'';
      }
      const c = rowH.filter(x=>x).length;
      document.getElementById('worp-info').innerText = `Worpen: ${throwCount}  Resterende: ${c}`;
      chart.data.datasets[0].data = history;
      chart.update();
    }

    function playTurn(){
      throwCount++;
      const r = Math.floor(Math.random()*S);
      const w = Math.floor(Math.random()*S);
      if(rowH[r] && !rowL[w]){ rowH[r]=false; rowL[w]=true; }
      history.push({x:throwCount, y: rowH.filter(x=>x).length});
      updateUI();
    }

    function autoToggle(){
      const btn = document.getElementById('autoBtn');
      if(!autoRunning){
        autoRunning = true;
        btn.textContent = 'Stop Auto';
        autoIntervalId = setInterval(()=>{
          playTurn();
          if (rowH.every(x=>!x)) { // alles overgezet
            clearInterval(autoIntervalId);
            autoIntervalId = null;
            autoRunning = false;
            btn.textContent = 'Auto';
          }
        }, 50);
      } else {
        // Stoppen
        autoRunning = false;
        btn.textContent = 'Auto';
        if (autoIntervalId) { clearInterval(autoIntervalId); autoIntervalId = null; }
      }
    }

    function resetGame(){
      // Stop auto indien actief
      if (autoIntervalId) { clearInterval(autoIntervalId); autoIntervalId = null; }
      autoRunning = false;
      document.getElementById('autoBtn').textContent = 'Auto';

      rowH = new Array(S).fill(true);
      rowL = new Array(S).fill(false);
      throwCount = 0;
      history = [{x:0, y:S}];
      // verwijder fitdataset indien aanwezig
      if (chart.data.datasets.length > 1) chart.data.datasets.pop();
      updateUI();
    }

    // ---------- FIT b=1 (reciproque) ----------
    function fitReciprocal(points){
      const valid = points.filter(p => p.y > 0);
      if (valid.length < 3) return { ok:false, msg:'Te weinig punten' };

      const x = valid.map(p=>p.x);
      const y = valid.map(p=>p.y);
      const maxX = Math.max(...x);
      const t0Max = Math.max(5, 0.5*maxX);
      const N = 80;

      function score(t0){
        // lineair in a: y ≈ a * u  met u = 1/(x+t0)
        let sum_yu=0, sum_u2=0;
        for (let i=0;i<x.length;i++){
          const u = 1/(x[i] + t0);
          sum_yu += y[i]*u;
          sum_u2 += u*u;
        }
        if (sum_u2 <= 0) return {a:NaN, sse:Infinity, r2:NaN};
        const a = sum_yu / sum_u2;
        const mean = y.reduce((s,v)=>s+v,0)/y.length;
        let sse=0, sst=0;
        for (let i=0;i<x.length;i++){
          const pred = a / (x[i] + t0);
          const e = y[i] - pred; sse += e*e;
          const d = y[i] - mean; sst += d*d;
        }
        const r2 = (sst>0)? (1 - sse/sst) : 1;
        return {a, sse, r2};
      }

      let best = {sse:Infinity, a:NaN, t0:NaN, r2:NaN};
      for (let k=0;k<N;k++){
        const t0 = (k/(N-1))*t0Max; // 0 .. t0Max
        const {a, sse, r2} = score(t0);
        if (sse < best.sse) best = {sse, a, t0, r2};
      }
      if (!isFinite(best.sse)) return { ok:false, msg:'Fit mislukt' };
      return { ok:true, a:best.a, t0:best.t0, r2:best.r2 };
    }

    function buildReciprocalDataset(a, t0, nMin, nMax){
      const data = [];
      const step = 0.1;
      for (let n=nMin; n<=nMax+1e-9; n+=step){
        const y = a / (n + t0);
        if (isFinite(y)) data.push({x:n, y});
      }
      return {
        label: 'Fit: N_H(n) = a/(n+n_0)',
        data,
        borderColor: 'blue',
        borderWidth: 2,
        pointRadius: 0,
        showLine: true
      };
    }

    function fitReciprocalPlot(){
      // verwijder vorige fit
      if (chart.data.datasets.length > 1) chart.data.datasets.pop();
      const res = fitReciprocal(history);
      if (!res.ok){
        document.getElementById('fit-info').innerText = 'Fit mislukt: ' + res.msg;
        return;
      }
      const nMin = Math.min(...history.map(p=>p.x));
      const nMax = Math.max(...history.map(p=>p.x));
      const fitDataset = buildReciprocalDataset(res.a, res.t0, nMin, nMax);
      chart.data.datasets.push(fitDataset);
      chart.update();
      document.getElementById('fit-info').innerText = `a=${res.a.toExponential(3)}, n0=${res.t0.toFixed(3)}, R²=${res.r2.toFixed(4)}`;
    }

    // --- Chart init ---
    const ctx = document.getElementById('decayChart').getContext('2d');
    chart = new Chart(ctx, {
      type: 'line',
      data: {
        datasets: [{ label: 'N_H(n) (Elektronen in H)', data: history, borderColor: 'red', tension: 0.1 }]
      },
      options: {
        scales: {
          x: { type: 'linear', title: { display: true, text: 'aantal worpen: n' } },
          y: { min: 0, max: S, title: { display: true, text: 'aantal elektronen in H: N_H' } }
        }
      }
    });

    createBoard();  
  </script>
</body>
</html>
