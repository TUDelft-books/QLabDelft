<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fosforescentie Toy Model</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; background-color: #f0f0f0; }
        .board { display: grid; grid-template-columns: repeat(10, 30px); gap: 5px; margin: 10px; }
        .square { width: 30px; height: 30px; border: 1px solid #333; display: flex; align-items: center; justify-content: center; font-size: 10px; border-radius: 3px; }
        .row-h { background-color: #ffcccc; } /* Roodachtig voor Hoog niveau */
        .row-l { background-color: #ccffcc; } /* Groenachtig voor Laag niveau */
        .coin { width: 20px; height: 20px; background-color: #444; border-radius: 50%; box-shadow: 1px 1px 2px rgba(0,0,0,0.5); }
        .controls { margin: 20px; text-align: center; }
        #chart-container { width: 80%; max-width: 600px; background: white; padding: 10px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .status-text { font-weight: bold; margin: 10px; color: #333; }
    </style>
</head>
<body>

    <h1>Fosforescentie Verval Model</h1>
    <p>Simulatie van tweede-orde kinetiek met dobbelstenen [Malgieri, 2018]</p>

    <div class="status-text">Rij H (Geëxciteerd)</div>
    <div id="board-h" class="board"></div>

    <div class="status-text">Rij L (Grondtoestand)</div>
    <div id="board-l" class="board"></div>

    <div class="controls">
        <button onclick="playTurn()">Gooi Dobbelstenen!</button>
        <button onclick="autoPlay()">Automatisch Afspelen</button>
        <button onclick="resetGame()">Reset</button>
        <div id="worp-info" style="margin-top: 10px;">Worpen: 0 | Resterende munten in H: 30</div>
    </div>

    <div id="chart-container">
        <canvas id="decayChart"></canvas>
    </div>

<script>
    const S = 30; // Aantal vakjes
    let rowH = new Array(S).fill(true);
    let rowL = new Array(S).fill(false);
    let throwCount = 0;
    let history = [{x: 0, y: S}];
    let chart;

    // Initialiseer borden
    function createBoard() {
        const boardH = document.getElementById('board-h');
        const boardL = document.getElementById('board-l');
        boardH.innerHTML = '';
        boardL.innerHTML = '';
        for (let i = 0; i < S; i++) {
            boardH.innerHTML += `<div id="h-${i}" class="square row-h">${rowH[i] ? '<div class="coin"></div>' : ''}</div>`;
            boardL.innerHTML += `<div id="l-${i}" class="square row-l">${rowL[i] ? '<div class="coin"></div>' : ''}</div>`;
        }
    }

    function updateUI() {
        for (let i = 0; i < S; i++) {
            document.getElementById(`h-${i}`).innerHTML = rowH[i] ? '<div class="coin"></div>' : '';
            document.getElementById(`l-${i}`).innerHTML = rowL[i] ? '<div class="coin"></div>' : '';
        }
        const coinsInH = rowH.filter(c => c).length;
        document.getElementById('worp-info').innerText = `Worpen: ${throwCount} | Resterende munten in H: ${coinsInH}`;
        
        // Update Grafiek
        chart.data.datasets.data = history;
        chart.update();
    }

    function playTurn() {
        throwCount++;
        const redDie = Math.floor(Math.random() * S);   // Selecteert vakje in H
        const whiteDie = Math.floor(Math.random() * S); // Selecteert vakje in L

        // De regels uit de bronnen [2]:
        // Verplaats munt als er een munt in H-vakje 'redDie' ligt EN L-vakje 'whiteDie' leeg is.
        if (rowH[redDie] === true && rowL[whiteDie] === false) {
            rowH[redDie] = false;
            rowL[whiteDie] = true;
        }

        const currentCoinsInH = rowH.filter(c => c).length;
        history.push({x: throwCount, y: currentCoinsInH});
        updateUI();
    }

    function autoPlay() {
        let interval = setInterval(() => {
            playTurn();
            if (rowH.every(c => !c) || throwCount > 500) clearInterval(interval);
        }, 50);
    }

    function resetGame() {
        rowH = new Array(S).fill(true);
        rowL = new Array(S).fill(false);
        throwCount = 0;
        history = [{x: 0, y: S}];
        updateUI();
    }

    // Chart.js configuratie
    const ctx = document.getElementById('decayChart').getContext('2d');
    chart = new Chart(ctx, {
        type: 'line',
        data: {
            datasets: [{
                label: 'Aantal munten in H (nH)',
                data: history,
                borderColor: 'rgb(255, 99, 132)',
                tension: 0.1
            }]
        },
        options: {
            scales: {
                x: { type: 'linear', title: { display: true, text: 'Aantal worpen (tijd)' } },
                y: { min: 0, max: S, title: { display: true, text: 'Aantal munten' } }
            }
        }
    });

    createBoard();
</script>
</body>
</html>
